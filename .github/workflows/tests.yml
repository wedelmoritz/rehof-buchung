# GitHub-Actions-Workflow für die Re:Hof Quartier-Buchung.
#
# Vier Jobs (laufen parallel):
#   1) reine-logik         – pytest ohne Datenbank, sehr schnelles Grün/Rot.
#   2) integration         – Django-Tests gegen echtes PostgreSQL (wie in Produktion).
#   3) migration-resilienz – Vorwärts-Migration auf einer BEFÜLLTEN Alt-DB.
#   4) e2e                 – Playwright gegen den prod-nahen Docker-Stack (ADR 0047).
#
# So bekommst du sofort Signal aus der reinen Logik, während die schwereren
# Jobs in einer produktionsnahen Umgebung laufen.

name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:        # erlaubt manuelles Auslösen über die GitHub-Oberfläche

# Laufende Durchgänge desselben Branches abbrechen, wenn neu gepusht wird.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # 1) Reine Logik: Losverfahren, Buchungszeiträume, Tage, Saison-Regeln.
  #    Braucht weder Datenbank noch Django-Setup -> in Sekunden durch.
  # --------------------------------------------------------------------------
  reine-logik:
    name: Reine Logik (pytest, ohne DB)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v7

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Tests der reinen Logik
        run: PYTHONPATH=. python -m pytest tests/ -v

      - name: Type-Check (mypy, reine Logik)
        run: |
          pip install mypy
          mypy

  # --------------------------------------------------------------------------
  # 1b) Abhängigkeits-Audit: bekannte Schwachstellen (CVE/GHSA) in den
  #     installierten Paketen aufspüren (pip-audit). Ergänzt Dependabot um ein
  #     hartes Gate im CI. Einen unvermeidbaren Befund gezielt ausnehmen mit
  #     `--ignore-vuln GHSA-xxxx` (mit Begründung). (ADR 0061)
  # --------------------------------------------------------------------------
  abhaengigkeits-audit:
    name: Abhängigkeits-Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v7

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: pip-audit (deklarierte Abhängigkeiten prüfen)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          # -r prüft den vollständig aufgelösten Baum aus requirements.txt
          # (inkl. transitiver Pakete), ohne die CI-Werkzeuge pip/setuptools/wheel
          # zu vermengen → die Befunde sind in unseren Pins behebbar.
          pip-audit -r requirements.txt --progress-spinner off

  # --------------------------------------------------------------------------
  # 2) Integration: Django-Tests gegen PostgreSQL (gleiche DB wie in Produktion).
  #    Fängt DB-spezifische Probleme, Migrationslücken und Service-Logik ab.
  # --------------------------------------------------------------------------
  integration:
    name: Integration (Django + PostgreSQL)
    runs-on: ubuntu-latest

    # PostgreSQL als Service-Container; Django legt darin seine Test-DB an.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rehof_test
          POSTGRES_USER: rehof
          POSTGRES_PASSWORD: rehof
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rehof -d rehof_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://rehof:rehof@localhost:5432/rehof_test
      SECRET_KEY: ci-nur-fuer-tests-nicht-fuer-produktion-0123456789
      DEBUG: "1"            # nutzt PostgreSQL via DATABASE_URL, ohne Prod-Härtung

    steps:
      - name: Code auschecken
        uses: actions/checkout@v7

      - name: Native Libs für WeasyPrint (Rechnungs-PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libffi8 shared-mime-info fonts-dejavu-core

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django-System-Check
        run: python manage.py check

      - name: Fehlende Migrationen erkennen
        run: python manage.py makemigrations --check --dry-run

      - name: Integrationstests (inkl. Use-Cases)
        run: python manage.py test booking shop -v2

  # --------------------------------------------------------------------------
  # 3) Migrations-Resilienz: Vorwärts-Migration auf einer BEFÜLLTEN Alt-DB.
  #    Der normale Testlauf migriert immer eine FRISCHE, leere DB – genau das
  #    verfehlte zwei Produktionsfehler (Unique-Index auf vorhandenen Duplikaten;
  #    "pending trigger events" bei DML+DDL in einem Schritt). Dieser Job baut den
  #    Altstand mit echten Daten nach und migriert vorwärts.
  # --------------------------------------------------------------------------
  migration-resilienz:
    name: Migration auf befüllter Alt-DB (alt → neu)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rehof_test
          POSTGRES_USER: rehof
          POSTGRES_PASSWORD: rehof
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rehof -d rehof_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://rehof:rehof@localhost:5432/rehof_test
      SECRET_KEY: ci-nur-fuer-tests-nicht-fuer-produktion-0123456789
      DEBUG: "1"

    steps:
      - name: Code auschecken
        uses: actions/checkout@v7

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auf aktuellen Stand migrieren und Stammdaten anlegen
        run: |
          python manage.py migrate
          python manage.py shell <<'PY'
          from decimal import Decimal
          from django.contrib.auth.models import User
          from booking.models import Member, EquivalenceClass, Quarter
          from shop.models import Invoice, LineItem
          u = User.objects.create_user("legacy", "legacy@example.org", "x" * 12)
          m = Member.objects.create(user=u, display_name="Legacy")
          eq = EquivalenceClass.objects.create(name="L")
          Quarter.objects.create(name="LegacyQ", eq_class=eq, min_occupancy=1, max_occupancy=4)
          # Abgerechnete Hofladen-Position OHNE Einkauf (wie vor shop 0003/0004)
          inv = Invoice.objects.create(member=m, number="HL-2025-01-001", year=2025, month=1)
          LineItem.objects.create(member=m, name="Äpfel", unit="kg",
              unit_price=Decimal("3.20"), vat_rate=7, quantity=Decimal("2"), invoice=inv)
          print("Stammdaten + abgerechnete Alt-Position angelegt.")
          PY

      - name: Booking & Shop auf Altstand (vor den Änderungen) zurücksetzen
        run: |
          python manage.py migrate booking 0015
          python manage.py migrate shop 0002

      - name: Problematischen Alt-Zustand erzeugen (zwei Perioden je Jahr + Wunsch)
        run: |
          python manage.py shell <<'PY'
          from django.db import connection
          from booking.models import Member, Quarter
          # WICHTIG: nur Spalten lesen/schreiben, die es im zurückgesetzten Stand
          # (booking 0015) schon gibt. Die aktuellen Modelle haben später ergänzte
          # Felder (Member.email_opt_in ab 0020, Quarter.external_bookable ab 0024,
          # Wish.membership ab 0042); ein volles ORM-SELECT/-INSERT würde hier auf
          # der Alt-DB scheitern. Über values_list("id") holen wir nur die ID, der
          # Wunsch wird roh mit ausschließlich Alt-Spalten eingefügt.
          # ACHTUNG: explizites order_by("id") – .first() würde sonst die aktuelle
          # Meta.ordering anwenden (z. B. Quarter: ["sort_order","name"] ab 0050),
          # und die Spalte gibt es im Stand 0015 noch nicht.
          member_id = Member.objects.order_by("id").values_list("id", flat=True).first()
          quarter_id = Quarter.objects.order_by("id").values_list("id", flat=True).first()
          with connection.cursor() as c:
              c.execute('INSERT INTO booking_bookingperiod '
                        '(name,target_year,"start","end",status,applies_to_all) '
                        'VALUES (%s,%s,%s,%s,%s,%s) RETURNING id',
                        ["Normalbuchung", 2099, "2099-01-01", "2100-01-01", "free_booking", True])
              c.execute('INSERT INTO booking_bookingperiod '
                        '(name,target_year,"start","end",status,applies_to_all) '
                        'VALUES (%s,%s,%s,%s,%s,%s) RETURNING id',
                        ["Pfarrhaeuser", 2099, "2099-05-01", "2099-10-01", "suspended", True])
              dup_id = c.fetchone()[0]
              # Wunsch an der Dublette: dessen Cascade-Löschung erzeugt die
              # "pending trigger events", an denen das ALTER TABLE scheiterte. Roh
              # einfügen (NICHT per ORM – das aktuelle Wish-Modell kennt membership_id,
              # die Spalte gibt es im Stand 0015 noch nicht).
              c.execute('INSERT INTO booking_wish '
                        '(period_id,member_id,quarter_id,"start","end",priority,submitted) '
                        'VALUES (%s,%s,%s,%s,%s,%s,%s)',
                        [dup_id, member_id, quarter_id, "2099-05-02", "2099-05-05", 1, True])
          print("Alt-Zustand: 2 Perioden für 2099 + Wunsch auf der Dublette.")
          PY

      - name: Vorwärts migrieren MUSS gelingen (war Ursache der 502)
        run: python manage.py migrate

      - name: Ergebnis prüfen – Periode & Hofladen-Einkauf
        run: |
          python manage.py shell <<'PY'
          from booking.models import BookingPeriod
          from shop.models import Purchase, LineItem
          n = BookingPeriod.objects.filter(target_year=2099).count()
          assert n == 1, f"Erwartet genau 1 Periode für 2099, gefunden {n}"
          # shop 0004: abgerechnete Alt-Position hat jetzt einen Einkauf
          li = LineItem.objects.get(name="Äpfel")
          assert li.purchase_id is not None, "Alt-Position ohne Einkauf nach Backfill"
          assert Purchase.objects.count() == 1, "Einkauf nicht nachgetragen"
          print("OK: eine Periode pro Jahr + Hofladen-Einkauf nachgetragen.")
          PY

  # --------------------------------------------------------------------------
  # 4) End-to-End: Playwright gegen den PROD-NAHEN Docker-Stack (ADR 0047).
  #    Gleiche Image-/Entrypoint-/Gunicorn-/PostgreSQL-Kette wie in Produktion
  #    (nur ohne Caddy/TLS). Deckt die echte Browser-/Server-/Cookie-/JS-Naht ab,
  #    die `manage.py test` (in-process) nicht sieht.
  # --------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright, prod-naher Docker-Stack)
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v7

      - name: Stack bauen und starten (gunicorn + PostgreSQL)
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Auf /healthz/ warten
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/healthz/ >/dev/null 2>&1; then
              echo "web ist gesund."; exit 0
            fi
            sleep 3
          done
          echo "::error::web wurde nicht rechtzeitig gesund"
          docker compose -f docker-compose.ci.yml logs web
          exit 1

      - name: Testdaten anlegen (test/admin/verwaltung + Hofladen)
        run: docker compose -f docker-compose.ci.yml exec -T web
             python manage.py seed_demo --testdata --yes

      - name: Python einrichten
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Playwright + Browser installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-e2e.txt
          python -m playwright install --with-deps chromium

      - name: E2E-Smoke-Tests
        run: python -m pytest tests_e2e/ --base-url http://localhost:8000 -v

      - name: Server-Logs bei Fehler
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs web

      - name: Stack abräumen
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
