# Docker-Compose-Stack für die Quartier-Buchung.
# Dienste: web (Django/Gunicorn) + db (PostgreSQL).
# Caddy läuft als eigener Container und erreicht web über das gemeinsame
# externe Docker-Netz (networks.caddy) unter web:8000 bzw. 10.42.42.20:8000.
# Caddy terminiert TLS und proxyt nach HTTP weiter – die App selbst spricht
# nur HTTP auf 0.0.0.0:8000.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal             # bewusst NICHT am caddy-Netz

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      # App-seitige Feld-Verschlüsselung (vorbereitet, noch inaktiv – ADR 0061).
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SEED_DEMO: ${SEED_DEMO:-0}     # 1 = Test-/Demo-Daten anlegen (additiv)
      DEMO_RESET: ${DEMO_RESET:-0}   # 1 = ALLES löschen + Demo neu (Vorsicht!)
      DEMO_WIPE: ${DEMO_WIPE:-0}     # 1 = NUR ALLES löschen (Vorsicht!)
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      TZ: ${TZ:-Europe/Berlin}
      # E-Mail (leer = Konsole/Log). Für echten Versand in der .env ausfüllen.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Re:Hof <noreply@localhost>}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      # Optional: nur wirksam, wenn gesetzt UND der redis-Dienst läuft
      # (docker compose --profile cache up -d).
      REDIS_URL: ${REDIS_URL:-}
      # Web-Push (PWA): BEIDE Schlüssel nötig, sonst ist Push aus (PUSH_ENABLED).
      # Erzeugen mit `docker compose exec web python manage.py vapid_keys`.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-}
      # Observability: Logging-Level + Sentry (nur mit DSN aktiv, ohne PII).
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    # KEIN ports: — kein Host-Port nötig, Caddy erreicht web im Docker-Netz.
    expose:
      - "8000"               # für Container im selben Netz (Caddy)
    # Healthcheck: /healthz/ prüft zusätzlich die DB-Erreichbarkeit. Schlägt fehl,
    # wenn Gunicorn nicht (mehr) antwortet ODER die DB weg ist – z.B. weil eine
    # Migration beim Start abgebrochen ist. So ist ein kaputter Start sofort an
    # `docker compose ps` (unhealthy) erkennbar, statt nur als 502 bei Caddy.
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s        # Zeit für Warten-auf-DB + Migrationen + Start
    networks:
      caddy:
        # Feste IP für Caddys reverse_proxy/Health-Check. Schema im Netz
        # compose_web (10.42.42.0/24): caddy=.10, web=.20.
        ipv4_address: 10.42.42.20
      internal: {}
    # gunicorn bindet 0.0.0.0:8000 (siehe entrypoint.sh)

  # Hintergrund-Scheduler (ersetzt klassischen Cron): führt regelmäßig fällige
  # Losungen aus (run_due_lotteries) und erstellt am Monatsanfang die Hofladen-
  # Rechnungen (run_monthly_invoices). Gleiches Image, eigener Container; wartet
  # via depends_on, bis web (und damit die Migrationen) bereit ist. Überschreibt
  # den Entrypoint, läuft also NICHT als Webserver.
  cron:
    build: .
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL:-}
      TZ: ${TZ:-Europe/Berlin}
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-900}   # alle 15 Min
      # E-Mail-Versand läuft im Scheduler (send_outbox) – dieselben Variablen.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Re:Hof <noreply@localhost>}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      # Der Scheduler stellt bei Losergebnissen etc. ebenfalls Push zu → braucht VAPID.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0}
    entrypoint: ["python", "manage.py", "run_scheduler"]
    networks:
      - internal

  # Cache/Session-/Axes-Store (empfohlen ab vielen gleichzeitigen Nutzern).
  # Standardmäßig AUS (minimaler, robuster DB-only-Stack). Aktivieren in 1 Schritt:
  #   1) in der .env:  REDIS_URL=redis://redis:6379/0
  #   2) starten:      docker compose --profile cache up -d
  # Sitzungen sind dank `cached_db` durabel (in der DB) – ein Redis-Neustart loggt
  # NICHT alle aus. `volatile-lru` verdrängt unter Speicherdruck nur Schlüssel mit
  # Ablauf (Sessions/Cache haben TTL), nie versehentlich dauerhafte Daten.
  # WICHTIG (Sicherheit): KEINEN Host-Port veröffentlichen – nur im internen Netz.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["cache"]
    command: ["redis-server", "--save", "", "--maxmemory", "256mb",
              "--maxmemory-policy", "volatile-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal: {}
  caddy:
    external: true
    # Muss das Netz sein, in dem der Caddy-Container hängt.
    # Mit `docker network ls` / `docker inspect <caddy>` auf dem Server prüfen.
    name: compose_web
