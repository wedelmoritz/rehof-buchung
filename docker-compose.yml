# Docker-Compose-Stack für die Quartier-Buchung.
# Dienste: web (Django/Gunicorn) + db (PostgreSQL).
# Caddy läuft bereits auf dem Host und proxyt auf 127.0.0.1:${WEB_PORT}.
# (Optional kann man Caddy auch als Service ergänzen – siehe README.)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal             # bewusst NICHT am caddy-Netz

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SEED_DEMO: ${SEED_DEMO:-0}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    # KEIN ports: — Zugriff ausschließlich über Caddy
    expose:
      - "8000"               # nur dokumentarisch
    networks:
      caddy:
        ipv4_address: 10.42.42.20
      internal: {}
    # gunicorn muss auf 0.0.0.0:8000 binden!

volumes:
  pgdata:

networks:
  internal: {}
  caddy:
    external: true
    name: compose_web        # <-- auf dem Server verifizieren, s.u.
