{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline – Re:Hof</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:#f6f4f1; color:#23201d;
      font:16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .box { text-align:center; padding:2rem 1.5rem; max-width:22rem; }
    .box img { width:84px; height:84px; }
    h1 { font-size:1.3rem; margin:1rem 0 .4rem; }
    p { color:#6b6259; }
    button { margin-top:1.2rem; font:inherit; font-weight:600; cursor:pointer; border:0;
      border-radius:10px; background:#be3e23; color:#fff; padding:.6rem 1.2rem; }
  </style>
</head>
<body>
  <div class="box">
    <img src="{% static 'booking/icons/logo.svg' %}" alt="Re:Hof">
    <h1>Gerade offline</h1>
    <p>Es besteht keine Internetverbindung. Zuletzt geöffnete Seiten sind weiter
       sichtbar; zum Buchen brauchst du wieder Verbindung.</p>
    <button id="retry">Erneut versuchen</button>
  </div>
  <script nonce="{{ request.csp_nonce }}">
    document.getElementById("retry").addEventListener("click", function () { location.reload(); });
  </script>
</body>
</html>
