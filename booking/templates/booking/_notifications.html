{% if notifications %}
<div class="card notif" style="border-color:var(--sage)">
  <strong>Benachrichtigungen</strong>
  <ul style="margin:.4rem 0 .6rem; padding-left:1.1rem">
    {% for n in notifications %}
    <li>{% if n.url %}<a href="{{ n.url }}">{{ n.message }}</a>{% else %}{{ n.message }}{% endif %}
      <span class="muted">· {{ n.created_at|date:"d.m. H:i" }}</span>
      {% if n.detail %}<div class="muted notif-detail" style="white-space:pre-line; margin:.25rem 0 .5rem">{{ n.detail }}</div>{% endif %}
    </li>
    {% endfor %}
  </ul>
  <form method="post" class="inline">{% csrf_token %}
    <input type="hidden" name="action" value="read_notifications">
    <button class="btn small ghost" type="submit">Als gelesen markieren</button>
  </form>
</div>
{% endif %}
