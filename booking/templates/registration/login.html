{% extends "booking/base.html" %}
{% block title %}Anmelden{% endblock %}
{% block content %}
<h1>Anmelden</h1>
<div class="card" style="max-width:420px">
  <form method="post">{% csrf_token %}
    {% for f in form %}
      <div class="field">{{ f.label_tag }} {{ f }}</div>
    {% endfor %}
    {% if form.errors %}<div class="msg error">Anmeldung fehlgeschlagen.</div>{% endif %}
    <button class="btn" type="submit">Anmelden</button>
  </form>
</div>
{% endblock %}
