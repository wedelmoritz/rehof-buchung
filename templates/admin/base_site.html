{% extends "admin/base.html" %}

{% block title %}{{ title }}{% if title %} | {% endif %}ReHof-Verwaltung{% endblock %}

{% block branding %}
<div id="site-name"><a href="{% url 'admin:index' %}">ReHof-Verwaltung</a></div>
{% endblock %}

{% block extrastyle %}{{ block.super }}
<style>
  /* Re:hof-Theme fürs Backend — SELBES Farbsystem wie die App (warmes Papier-
     Neutral, near-black Text, Terrakotta-Akzent sparsam, Salbei sekundär).
     Überschreibt die CSS-Variablen des Django-Admins. */
  :root {
    /* Akzent Terrakotta #BE3E23, Sekundär Salbei #7F8F8C. */
    --primary: #be3e23;
    --secondary: #9e3119;
    --accent: #7f8f8c;
    --primary-fg: #ffffff;

    --body-bg: #f6f4f1;
    --body-fg: #23201d;
    --body-quiet-color: #6b6259;
    --body-loud-color: #23201d;

    --header-bg: #efebe5;
    --header-color: #4a423b;
    --header-branding-color: #be3e23;
    --header-link-color: #4a423b;

    --breadcrumbs-bg: #efebe5;
    --breadcrumbs-fg: #6b6259;
    --breadcrumbs-link-fg: #9e3119;

    --link-fg: #b03720;
    --link-hover-color: #8a2c16;
    --link-selected-fg: #8a2c16;

    --button-bg: #be3e23;
    --button-fg: #ffffff;
    --button-hover-bg: #9e3119;
    --default-button-bg: #7f8f8c;
    --default-button-hover-bg: #566c68;
    --close-button-bg: #8a8079;
    --close-button-hover-bg: #6b6259;
    --object-tools-bg: #9e3119;
    --object-tools-hover-bg: #8a2c16;

    --selected-bg: #fbe9e4;
    --selected-row: #fbe9e4;
    --darkened-bg: #ece7e0;
    --message-success-bg: #e8eceb;
    --message-warning-bg: #f7ecd6;
    --message-error-bg: #f8e4e0;
  }
  /* LESBARKEIT: Fieldset-/Inline-Überschriften dunkel statt hellgrau auf Beige. */
  .module h2, .module caption, .inline-group h2, fieldset.module > h2,
  .inline-related h3, .inline-related h3 b, .module table caption,
  .inline-group .tabular caption {
    color: var(--body-loud-color) !important; background: var(--darkened-bg);
  }
  fieldset.module > h2, .inline-group h2 { padding: 9px 12px; font-weight: 700; }
  .aligned label, fieldset .form-row > div > label { color: #4a4038; }
  fieldset .description, .help, .helptext, p.help, .form-row .help {
    color: var(--body-quiet-color) !important; }
  /* Kopfzeile abrunden/auflockern */
  #header { border-bottom: 1px solid #e4dfd8; }
  #branding h1, #branding h1 a:link, #branding h1 a:visited,
  #site-name a:link, #site-name a:visited { color: var(--header-branding-color); font-weight: 800; }
  div.breadcrumbs { border-bottom: 1px solid #e4dfd8; }
  /* Mehr Ruhe: Module mit weichem Schatten + abgerundet, etwas Luft dazwischen. */
  .module { border-radius: 12px; overflow: hidden; margin-bottom: 1.1rem;
    box-shadow: 0 1px 2px rgba(60,53,47,.035), 0 8px 22px rgba(60,53,47,.04); }
  .module h2, .module caption, .inline-group h2 { border-radius: 0; letter-spacing: .01em; }
  .button, input[type=submit], input[type=button], .submit-row input, a.button { border-radius: 9px; }
  .object-tools a { border-radius: 9px; }
  #content-main .module table tbody tr:hover { background: #fbe9e4; }
</style>
{% endblock %}
